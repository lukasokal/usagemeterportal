name: Build and Deploy to Kubernetes

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  K8S_NAMESPACE: usagemeterportal

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Check for KUBE_CONFIG_DATA
        id: check-kube-config
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -n "$KUBE_CONFIG" ]; then
            echo "has_kube_config=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_kube_config=false" >> "$GITHUB_OUTPUT"
            echo "::warning::KUBE_CONFIG_DATA secret not configured — skipping Kubernetes deployment"
          fi

      - name: Set up kubectl
        if: steps.check-kube-config.outputs.has_kube_config == 'true'
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: steps.check-kube-config.outputs.has_kube_config == 'true'
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy manifests
        if: steps.check-kube-config.outputs.has_kube_config == 'true'
        run: |
          kubectl apply -k k8s
          kubectl -n "${K8S_NAMESPACE}" set image deployment/usagemeterportal usagemeterportal="${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/usagemeterportal --timeout=180s

      - name: Deployment skipped
        if: steps.kube-config.outputs.available != 'true'
        run: echo "Container image was built and pushed, but Kubernetes deployment was skipped because KUBE_CONFIG_DATA is not set."
